<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Story - Mr. Green & Red</title>
    <style>
        /* --- 1. 字體設定 --- */
        @font-face {
            font-family: 'Cubic';
            src: url('Cubic_11.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff; 
            font-family: 'Cubic', sans-serif;
            color: #333;
            padding-top: 80px; 
            overflow-x: hidden; 
        }

        /* --- Header (保持不變) --- */
        .ui-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;       
            background-color: #ffffff; 
            border-bottom: 2px solid #333; 
            display: flex;
            justify-content: space-between;
            align-items: center; 
            padding: 0 40px;     
            z-index: 1000;
        }
        .home-btn { display: block; width: 50px; height: 50px; transition: transform 0.2s; }
        .home-btn img { width: 100%; height: 100%; object-fit: contain; }
        .home-btn:hover { transform: scale(1.1); }
        .menu-container { position: relative; }
        .hamburger-icon { width: 35px; height: 30px; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }
        .lines-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; transition: opacity 0.2s; }
        .lines-wrapper span { display: block; width: 100%; height: 4px; background-color: #333; border-radius: 4px; }
        .hover-img { width: 150%; height: 150%; object-fit: contain; display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .hamburger-icon:hover .lines-wrapper, .menu-container.active .hamburger-icon .lines-wrapper { display: none; }
        .hamburger-icon:hover .hover-img, .menu-container.active .hamburger-icon .hover-img { display: block; }
        .menu-list { position: absolute; top: 60px; right: 0; background-color: #ffffff; border: 2px solid #333; border-radius: 8px; width: 140px; display: none; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 1001; }
        .menu-list.show { display: flex; }
        .menu-list a { text-decoration: none; color: #333; padding: 15px; text-align: center; border-bottom: 1px solid #eee; font-size: 18px; transition: background 0.2s; }
        .menu-list a:last-child { border-bottom: none; }
        .menu-list a:hover { background-color: #f0f0f0; color: #000; }

        /* --- Hero Banner --- */
        .hero-section {
            position: relative;
            width: 100%;
            min-height: calc(100vh - 80px);
            background-color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }
        .content-container { width: 100%; max-width: 1200px; display: flex; align-items: center; justify-content: center; gap: 80px; }
        .hero-logo { flex: 1; display: flex; justify-content: flex-start; padding-left: 120px; }
        .hero-logo img { width: 100%; max-width: 300px; height: auto; object-fit: contain; }
        .hero-text { flex: 1; text-align: left; color: #000; transform: translateX(-80px); }
        .hero-text h1 { font-size: 20px; margin-bottom: 40px; font-weight: bold; letter-spacing: 2px; }
        .hero-text p { font-size: 14px; line-height: 2; margin-bottom: 25px; text-align: justify; }
        .hero-tags { margin-top: 30px; font-size: 14px; font-weight: bold; color: #009966; }

        /* 固定角色 (Mr. Green) */
        #fixed-green {
            position: absolute; 
            bottom: -150px; 
            right: 80px; 
            width: 250px;
            z-index: 10; 
        }

        /* --- 共用 Story Section 樣式 --- */
        .story-section {
            position: relative;
            width: 100%;
            padding: 100px 50px;
            overflow: hidden;
            z-index: 1;
        }

        /* =========================================
           共用的可滾動箱子與客製化滾輪樣式
           ========================================= */
        .story-scroll-box {
            height: 400px; /* 固定高度，超過這個高度就會出現滾輪 */
            overflow-y: auto; /* 垂直方向超出時出現滾輪 */
            overflow-x: hidden;
            border: 4px solid #333; /* 加上黑框更有彈窗的感覺 */
            background-color: #fff;
            opacity: 0; /* 配合滑入動畫 */
            transition: all 1s ease-out;
        }

        /* 確保裡面的長圖寬度自動填滿箱子 */
        .inner-story-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- 客製化「復古黑白」滾輪樣式 --- */
        .story-scroll-box::-webkit-scrollbar { width: 18px; }
        .story-scroll-box::-webkit-scrollbar-track { background: #fff; border-left: 3px solid #333; }
        .story-scroll-box::-webkit-scrollbar-thumb { background: #333; border: 3px solid #fff; }

        /* ========================================= */
        
        /* 【新增】左邊 Story 1 (改成滾動箱子) */
        #story1-box {
            width: 80%;       
            display: block;   
            margin: 0 auto;   
            margin-top: 0px;  
            transform: translateX(-100px); 
        }

        /* 左邊 Story 3 */
        #story3-img {
            width: 40%;       
            display: block;   
            margin: 0 auto;   
            margin-top: 0px;  
            transform: translateX(-100px); 
        }

        /* 右邊 Story 4 (改成滾動箱子) */
        #story4-box {
            width: 80%;       
            display: block;   
            margin: 0 auto;   
            margin-top: 50px; 
            margin-left: -30px;
            transform: translateX(100px); /* 保持動畫初始位置 */
        }


        /* === 這一區是 Story 5 & 6 (結尾區) === */

        /* 左邊 Story 5 (改成滾動箱子) */
        #story5-box {
            width: 80%;       
            display: block;
            margin: 0 auto;
            margin-top: -20px; 
            margin-right: -20px;
            transform: translateX(-100px);
        }

        /* 右邊 Story 6 */
        #story6-img {
            width: 30%;
            display: block;
            margin: 0 auto;
            margin-top: 20px;  
            margin-left: 0px;
            transform: translateX(100px);
        }

        /* 第一段：灰色背景 */
        .bg-gray-intro {
            background-image: url('secpic/gray.png');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            padding-top: 350px; 
        }

        /* 白色背景 */
        .bg-white {
            background-color: #ffffff;
        }

        .story-row {
            display: flex;           
            justify-content: center; 
            align-items: flex-start; 
            gap: 80px;               
            max-width: 1200px;
            margin: 0 auto;
            position: relative; 
            z-index: 2; 
        }

        .story-img-box {
            flex: 1; 
            max-width: 500px; 
        }

        .story-img {
            width: 100%;
            height: auto;
            opacity: 0; 
            transition: all 1s ease-out;
        }

        /* --- 角色過場區塊 (green1) --- */
        .interlude-section {
            width: 100%;
            padding: 80px 0;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .green-character {
            width: 1050px; 
            height: auto;
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease;
        }
        .green-character.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- 頁尾連結區塊 (Footer) --- */
        .footer-section {
            position: relative;
            width: 100%;
            padding: 400px 20px 250px 20px; 
            background-color: #ffffff;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 5; 
        }

        #green2-img {
            position: absolute; 
            bottom: 0; 
            left: 50%;
            transform: translateX(-50%) scale(0.8); 
            width: 1280px;
            opacity: 0;
            transition: all 0.8s ease;
            z-index: 0; 
        }
        
        #green2-img.active { 
            opacity: 1; 
            transform: translateX(-50%) scale(1); 
        }

        .social-links {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 30px;
            transform: translateX(200px);
            transform: translateY(230px);
        }

        .social-icon {
            width: 30px;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .social-icon:hover {
            transform: scale(1.1);
        }

        /* --- 動畫效果 --- */
        .slide-left { transform: translateX(-100px); }
        .slide-left.active { opacity: 1; transform: translateX(0); }

        .slide-right { transform: translateX(100px); }
        .slide-right.active { opacity: 1; transform: translateX(0); }

        /* 手機版 RWD */
        @media (max-width: 900px) {
            .content-container { flex-direction: column; text-align: center; gap: 40px; }
            .hero-logo { justify-content: center; padding-left: 0; }
            .hero-text { text-align: center; padding: 0 20px; transform: none; }
            .hero-text p { text-align: left; }
            .story-row { flex-direction: column; gap: 40px;}
            #fixed-green { width: 100px; right: 10px; } 
            .bg-gray-intro { padding-top: 150px; } 
        }

        /* =========================================
           Activity 彈窗與六張圖層設定
           ========================================= */
        #activity-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.85); 
            z-index: 20000; 
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.5s ease;
        }

        #activity-popup.show-popup {
            opacity: 1;
            pointer-events: auto; 
        }

        .popup-layer {
            position: absolute;
            opacity: 0;
            transform: scale(0.8); 
            transition: opacity 0.4s ease, transform 0.4s ease;
            cursor: pointer;
            pointer-events: none; 
        }

        .popup-layer.layer-visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto; 
        }

        #pop-layer1 { z-index: 16; top: 16%; left: 40%; width: 27%; }
        #pop-layer2 { z-index: 15; top: 40%; left: 27%; width: 35%; }
        #pop-layer3 { z-index: 14; top: 23%; left: 60%; width: 23%; }
        #pop-layer4 { z-index: 13; top: 65%; left: 10%; width: 25%; }
        #pop-layer5 { z-index: 12; top: 50%; left: 60%; width: 20%; }
        #pop-layer6 { z-index: 11; top: 30%; left: 18%; width: 20%; }

    </style>
</head>
<body>

    <div class="ui-header">
        <a href="index.html?skip=true" class="home-btn"><img src="firstpic/home.png" alt="Home"></a>
        <div class="menu-container" id="menuContainer">
            <div class="hamburger-icon" onclick="toggleMenu()">
                <div class="lines-wrapper"><span></span><span></span><span></span></div>
                <img src="firstpic/hover.png" alt="Menu Hover" class="hover-img">
            </div>
            <div class="menu-list" id="menuList">
                <a href="bookri.html">關於</a><a href="bookle.html">周邊</a>
                
                <a href="#" id="obj-activity" class="obj-container">活動</a>
                
                <a href="calender.html">品牌</a><a href="computer.html">地圖</a>
            </div>
        </div>
    </div>

    <div id="activity-popup">
        <img class="popup-layer" id="pop-layer6" src="thirdpic/6.png">
        <img class="popup-layer" id="pop-layer5" src="thirdpic/5.png">
        <img class="popup-layer" id="pop-layer4" src="thirdpic/4.png">
        <img class="popup-layer" id="pop-layer3" src="thirdpic/3.png">
        <img class="popup-layer" id="pop-layer2" src="thirdpic/2.png">
        <img class="popup-layer" id="pop-layer1" src="thirdpic/1.png">
    </div>

    <div class="hero-section">
        <div class="content-container">
            <div class="hero-logo"><img src="secpic/logo.png" alt="Logo"></div>
            <div class="hero-text">
                <h1>品牌緣起</h1>
                <p>《格林先生》誕生於台灣街頭的紅綠燈之間。靜止的小紅人與行進的小綠人陪伴我們度過無數個街口時刻，也映照出城市的節奏與人們的生活步調。</p>
                <p>我們將這兩個熟悉轉化為角色 - 格林先生與瑞德先生，展開關於他們的都市故事。<br>這不只是紅綠燈的故事，更是屬於台灣街頭的溫柔節奏。</p>
                <div class="hero-tags">#交通號誌 #地方文化 #品牌塑造</div>
            </div>
        </div>
        <img src="secpic/green.png" id="fixed-green" alt="Mr. Green">
    </div>

    <div class="story-section bg-gray-intro">  
        <div class="story-row">
            <div class="story-img-box">
                <div class="story-scroll-box slide-left" id="story1-box">
                    <img src="secpic/story1.png" class="inner-story-img" alt="Story 1">
                </div>
            </div>
            <div class="story-img-box">
                <img src="secpic/story2.png" class="story-img slide-right" id="story2-img" alt="Story 2">
            </div>
        </div>
    </div>

    <div class="story-section bg-white">
        <div class="story-row" style="gap: 0px;">
            <div class="story-img-box">
                <img src="secpic/story3.png" class="story-img slide-left" id="story3-img" alt="Story 3">
            </div>
            
            <div class="story-img-box">
                <div class="story-scroll-box slide-right" id="story4-box">
                    <img src="secpic/story4.png" class="inner-story-img" alt="Story 4">
                </div>
            </div>
        </div>
    </div>

    <div class="interlude-section">
        <img src="secpic/green1.png" class="green-character" id="green1-img" alt="Mr. Green Walking">
    </div>

    <div class="story-section bg-white">
        <div class="story-row" style="gap: 100px;">
            <div class="story-img-box">
                <div class="story-scroll-box slide-left" id="story5-box">
                    <img src="secpic/story5.png" class="inner-story-img" alt="Story 5">
                </div>
            </div>
            <div class="story-img-box">
                <img src="secpic/story6.png" class="story-img slide-right" id="story6-img" alt="Story 6">
            </div>
        </div>
    </div>

    <div class="footer-section">
        <img src="secpic/green2.png" id="green2-img" alt="Mr. Green Ending">
        
        <div class="social-links">
            <a href="https://instagram.com" target="_blank">
                <img src="secpic/insta.png" class="social-icon" alt="Instagram">
            </a>
            <a href="https://threads.net" target="_blank">
                <img src="secpic/threa.png" class="social-icon" alt="Threads">
            </a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('menuList').classList.toggle('show');
            document.getElementById('menuContainer').classList.toggle('active');
        }
        document.addEventListener('click', (e) => {
            if (!document.getElementById('menuContainer').contains(e.target)) {
                document.getElementById('menuList').classList.remove('show');
                document.getElementById('menuContainer').classList.remove('active');
            }
        });

        // --- 捲動觸發動畫邏輯 ---
        window.addEventListener('scroll', revealOnScroll);

        function revealOnScroll() {
            const windowHeight = window.innerHeight;
            // 設定觸發點：元素頂部進入視窗下方 150px 時觸發
            const revealPoint = 150;

            // 【修改點 2】更新這裡的 ID，讓滾動動畫抓得到新建立的 box
            const animElementIds = [
                'story1-box', 'story2-img', // <- 這裡改為 box
                'story3-img', 'story4-box', 
                'green1-img',
                'story5-box', 'story6-img', 
                'green2-img'
            ];

            animElementIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) { // 確保元素存在才執行
                    const elementTop = el.getBoundingClientRect().top;
                    if (elementTop < windowHeight - revealPoint) {
                        el.classList.add('active');
                    }
                }
            });
        }
        
        // 頁面載入時先執行一次，確保重新整理時在視野內的元素會顯示
        revealOnScroll();

        // =========================================
        // Activity 彈窗互動邏輯
        // =========================================
        const btnActivity = document.getElementById('obj-activity');
        const activityPopup = document.getElementById('activity-popup');
        
        // 按照 6 到 1 的順序排好，方便等一下「依序發牌」
        const popLayers = [
            document.getElementById('pop-layer6'),
            document.getElementById('pop-layer5'),
            document.getElementById('pop-layer4'),
            document.getElementById('pop-layer3'),
            document.getElementById('pop-layer2'),
            document.getElementById('pop-layer1')
        ];

        // 1. 點擊 activity 按鈕：打開彈窗並依序顯示圖片
        btnActivity.addEventListener('click', function(e) {
            e.preventDefault(); // 防止網址跳轉
            activityPopup.classList.add('show-popup'); // 背景淡入
            
            // 延遲發牌動畫 (每隔 0.15 秒出現一張，6 -> 5 -> 4 -> 3 -> 2 -> 1)
            popLayers.forEach((layer, index) => {
                setTimeout(() => {
                    layer.classList.add('layer-visible');
                }, 300 + (index * 150)); 
            });
        });

        // 2. 點擊圖片：讓它消失。如果是最後一張 (6.png)，就關閉整個彈窗
        popLayers.forEach((layer, index) => {
            layer.addEventListener('click', function() {
                // 點擊後把自己隱藏
                this.classList.remove('layer-visible');
                
                // 檢查是不是點到 6.png (在陣列裡 index 是 0)
                if (index === 0) {
                    // 等 6.png 縮小的動畫跑完 (約 0.4秒) 後，關閉整個彈窗背景
                    setTimeout(() => {
                        activityPopup.classList.remove('show-popup');
                    }, 400); 
                }
            });
        });

    </script>

</body>
</html>
