<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dynamic Website</title>
    <style>
        /* --- 基礎設定 --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* --- 1. 開場影片層 --- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- 2. 主內容容器 --- */
        #main-content {
            position: relative;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.0s ease;
            z-index: 1;
        }

        /* --- 3. 場景容器 (負責等比例縮放與完整顯示) --- */
        #scene-container {
            position: absolute;
            top: 50%;  /* 改成 50%，讓整個場景完美垂直置中 */
            left: 50%;
            transform: translate(-50%, -50%);
            
            /* 【魔法參數：確保圖片絕對不會跑出螢幕】
               這裡的意思是：寬度預設佔螢幕的 95% (vw)，
               但如果螢幕高度不夠時，就改用高度的 165% (vh) 來限制寬度。
               這樣圖片就不會因為過度放大而被上下裁切掉！ */
            width: min(100vw, 200vh); 
            
            max-width: 1920px; 
            z-index: 1;
        }

        /* --- 4. 背景圖片 --- */
        #main-bg {
            display: block;
            width: 100%; 
            height: auto; /* 讓高度自然跟著上面的 width 比例縮放 */
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        #main-bg.bg-visible {
            opacity: 1 !important;
        }
        /* =========================================
           移動車輛動畫設定 (Car Animation)
           ========================================= */
        #moving-car {
            position: absolute;
            z-index: 2;
            
            /* 改用百分比：從場景左側外面一點點出發 */
            left: -15%; 
            
            /* 【請注意這裡】上下位置先大約抓 95% */
            top: 85%;   
            
            /* 車子大小也改用百分比，讓它跟背景比例一致 */
            width: 20%; 
            
            height: auto;
            opacity: 0; 
            transition: opacity 1.2s ease; 
            pointer-events: none; 
        }

        #moving-car.car-visible {
            opacity: 1 !important;
            animation: driveRight 8s linear infinite; 
        }

        /* 讓車子往右開出畫面 */
        @keyframes driveRight {
            0% { transform: translateX(0); }
            100% { transform: translateX(130vw); }
        }

        /* --- 5. 互動物件共用設定 (Class) --- */
        .obj-container {
            position: absolute;
            display: block; 
            z-index: 5; 
            opacity: 0;
            transition: opacity 1.2s ease; 
            cursor: pointer;
            text-decoration: none; 
            outline: none; 
        }

        .obj-container.obj-visible {
            opacity: 1 !important;
        }

        .obj-container img {
            display: block;
            width: 100%; /* 寬度配合 a 標籤設定的百分比自動填滿 */
            height: auto; /* 高度自動等比例 */
            border: none;
            /* border: 1px solid red; */
        }
        
        /* 黑白底圖 */
        .img-bw {
            position: relative;
        }

        /* 彩色上圖 */
        .img-color {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* Hover 效果 */
        .obj-container:hover .img-color {
            opacity: 1;
        }

        /* =========================================
           【物件位置與大小設定區 (已改為百分比 %)】
           注意：這邊的百分比現在是相對於「背景圖」，
           你貼上後可以直接在瀏覽器微調 top 和 left
           ========================================= */
        
        /* 1. 電腦 (Computer) */
        #obj-computer {
            top: 14%;
            left: 25%;
            width: 25%; 
        }

        /* 2. 活動 (Activity) */
        #obj-activity {
            top: 28%;
            left: 73%;
            width: 20%; 
        }

        /* 3. 日曆 (Calender) */
        #obj-calender {
            top: 70%;
            left: 33%;
            width: 18%;  
        }

        /* 4. 書本右 (Book Right) */
        #obj-bookri {
            top: 32%;
            left: 62%;
            width: 10%;  
        }

        /* 5. 書本左 (Book Left) */
        #obj-bookle {
            top: 14%;
            left: 63.5%;
            width: 10%;  
        }

        /* 6. 奶茶 (milk) */
        #obj-milk {
            top: 43%;
            left: 2%;
            width: 28%;  
        }

        /* --- 6. Logo --- */
        #main-logo {
            position: absolute;
            z-index: 10;
            top: 30px;
            left: 40px;
            transform: scale(0.4);
            transform-origin: top left;
            width: 500px;
            height: auto;
            pointer-events: auto;
        }

        /* 輔助 class */
        .hidden { opacity: 0; pointer-events: none; }
        .visible { opacity: 1 !important; }

        #count-gif {
            position: absolute;
            z-index: 4; /* 讓它在背景之上 */
            top: 15%;   /* 先暫時放在中間，等你微調 */
            left: 85%;
            width: 6%; /* 先暫時設定 10% 大小 */
            opacity: 0; /* 一開始先隱藏，跟著大家一起淡入 */
            transition: opacity 1.2s ease;
        }

        #count-gif.count-visible {
            opacity: 1 !important;
        }

        /* =========================================
           Activity 彈窗與六張圖層設定
           ========================================= */
        #activity-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.85); /* 半透明白底覆蓋 */
            z-index: 20000; /* 超高層級，保證蓋住所有場景 */
            opacity: 0;
            pointer-events: none; /* 隱藏時不能點擊 */
            transition: opacity 0.5s ease;
        }

        #activity-popup.show-popup {
            opacity: 1;
            pointer-events: auto; /* 顯示時恢復點擊 */
        }

        .popup-layer {
            position: absolute;
            opacity: 0;
            transform: scale(0.8); /* 一開始縮小一點，出現時會有放大的動態感 */
            transition: opacity 0.4s ease, transform 0.4s ease;
            cursor: pointer;
            pointer-events: none; 
        }

        /* 圖片出現時的動畫狀態 */
        .popup-layer.layer-visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto; /* 出現後才能被點擊 */
        }

        /* --- 套用你設定好的六張圖片專屬位置與大小 --- */
        
        /* 第 1 張 (最上層，最先被點擊) */
        #pop-layer1 { 
            z-index: 16; 
            top: 16%;   
            left: 40%;  
            width: 27%; 
        }

        /* 第 2 張 */
        #pop-layer2 { 
            z-index: 15; 
            top: 40%; 
            left: 27%; 
            width: 35%; 
        }

        /* 第 3 張 */
        #pop-layer3 { 
            z-index: 14; 
            top: 23%; 
            left: 60%; 
            width: 23%; 
        }

        /* 第 4 張 */
        #pop-layer4 { 
            z-index: 13; 
            top: 65%; 
            left: 10%; 
            width: 25%; 
        }

        /* 第 5 張 */
        #pop-layer5 { 
            z-index: 12; 
            top: 50%; 
            left: 60%; 
            width: 20%; 
        }
        
        /* 第 6 張 (最底層) */
        #pop-layer6 { 
            z-index: 11; 
            top: 30%; 
            left: 18%; 
            width: 20%; 
        }

    </style>
</head>
<body>

    <div id="intro-overlay">
        <video id="intro-video" muted autoplay playsinline>
            <source src="logo motion3.mp4" type="video/mp4">
        </video>
    </div>

    <main id="main-content">
        
        <div id="scene-container">
            
            <img id="main-bg" src="firstpic/first.jpg" alt="Background Room">

            <a href="#" id="obj-activity" class="obj-container">
                <img src="firstpic/activity.png" class="img-bw" alt="Activity BW">
                <img src="firstpic/activity - color.png" class="img-color" alt="Activity Color">
            </a>

            <div id="activity-popup">
                <img class="popup-layer" id="pop-layer6" src="thirdpic/6.png">
                <img class="popup-layer" id="pop-layer5" src="thirdpic/5.png">
                <img class="popup-layer" id="pop-layer4" src="thirdpic/4.png">
                <img class="popup-layer" id="pop-layer3" src="thirdpic/3.png">
                <img class="popup-layer" id="pop-layer2" src="thirdpic/2.png">
                <img class="popup-layer" id="pop-layer1" src="thirdpic/1.png">
            </div>

            <a href="computer.html" id="obj-computer" class="obj-container">
                <img src="firstpic/computer.png" class="img-bw" alt="Computer BW">
                <img src="firstpic/computer-color.png" class="img-color" alt="Computer Color">
            </a>

            <a href="calender.html" id="obj-calender" class="obj-container">
                <img src="firstpic/calender.png" class="img-bw" alt="Calender BW">
                <img src="firstpic/calender - color.png" class="img-color" alt="Calender Color">
            </a>

            <a href="bookri.html" id="obj-bookri" class="obj-container">
                <img src="firstpic/bookri.png" class="img-bw" alt="Book Right BW">
                <img src="firstpic/bookri - color.png" class="img-color" alt="Book Right Color">
            </a>

            <a href="bookle.html" id="obj-bookle" class="obj-container">
                <img src="firstpic/bookle.png" class="img-bw" alt="Book Left BW">
                <img src="firstpic/bookle - color.png" class="img-color" alt="Book Left Color">
            </a>

            <a href="dinosaur.html" id="obj-milk" class="obj-container">
                <img src="firstpic/milk.png" class="img-bw" alt="milk BW">
                <img src="firstpic/milk_1.png" class="img-color" alt="milk Color">
            </a>
            <img id="count-gif" src="firstpic/count.gif" alt="Count Animation">
            <img id="moving-car" src="firstpic/car.gif" alt="Moving Car">

        </div>

    </main>

    <script>
        const introOverlay = document.getElementById('intro-overlay');
        const introVideo = document.getElementById('intro-video');
        const mainContent = document.getElementById('main-content');
        const mainBg = document.getElementById('main-bg');
        const body = document.body;

        const movingCar = document.getElementById('moving-car');
        const countGif = document.getElementById('count-gif');

        const objComputer = document.getElementById('obj-computer');
        const objActivity = document.getElementById('obj-activity');
        const objCalender = document.getElementById('obj-calender');
        const objBookri = document.getElementById('obj-bookri');
        const objBookle = document.getElementById('obj-bookle');
        const objmilk = document.getElementById('obj-milk');

        const urlParams = new URLSearchParams(window.location.search);
        const shouldSkip = urlParams.get('skip') === 'true';

        if (shouldSkip) {
            console.log("偵測到 skip 指令，跳過開場影片");
            introOverlay.style.display = 'none';
            introVideo.pause(); 
            mainContent.classList.add('visible');
            
            setTimeout(() => {
                startTransition();
            }, 50);

        } else {
            console.log("正常播放開場影片");
            introVideo.addEventListener('ended', () => {
                console.log("影片結束");
                introOverlay.classList.add('hidden'); 
                mainContent.classList.add('visible'); 
                
                setTimeout(() => { introOverlay.style.display = 'none'; }, 800);
                setTimeout(() => { startTransition(); }, 1000); 
            });
        }

        function startTransition() {
            console.log("執行物件進場動畫");
            
            mainBg.classList.add('bg-visible');
            movingCar.classList.add('car-visible');
            countGif.classList.add('count-visible');

            objComputer.classList.add('obj-visible');
            objActivity.classList.add('obj-visible');
            objCalender.classList.add('obj-visible');
            objBookri.classList.add('obj-visible');
            objBookle.classList.add('obj-visible');
            objmilk.classList.add('obj-visible');

            setTimeout(() => {
                body.style.overflow = 'auto';
            }, 1200);
        }

        // =========================================
        // Activity 彈窗互動邏輯
        // =========================================
        const btnActivity = document.getElementById('obj-activity');
        const activityPopup = document.getElementById('activity-popup');
        
        // 按照 6 到 1 的順序排好，方便等一下「依序發牌」
        const popLayers = [
            document.getElementById('pop-layer6'),
            document.getElementById('pop-layer5'),
            document.getElementById('pop-layer4'),
            document.getElementById('pop-layer3'),
            document.getElementById('pop-layer2'),
            document.getElementById('pop-layer1')
        ];

        // 1. 點擊 activity 按鈕：打開彈窗並依序顯示圖片
        btnActivity.addEventListener('click', function(e) {
            e.preventDefault(); // 防止網址跳轉
            activityPopup.classList.add('show-popup'); // 背景淡入
            
            // 延遲發牌動畫 (每隔 0.15 秒出現一張，6 -> 5 -> 4 -> 3 -> 2 -> 1)
            popLayers.forEach((layer, index) => {
                setTimeout(() => {
                    layer.classList.add('layer-visible');
                }, 300 + (index * 150)); 
            });
        });

        // 2. 點擊圖片：讓它消失。如果是最後一張 (6.png)，就關閉整個彈窗
        popLayers.forEach((layer, index) => {
            layer.addEventListener('click', function() {
                // 點擊後把自己隱藏
                this.classList.remove('layer-visible');
                
                // 檢查是不是點到 6.png (在陣列裡 index 是 0)
                if (index === 0) {
                    // 等 6.png 縮小的動畫跑完 (約 0.4秒) 後，關閉整個彈窗背景
                    setTimeout(() => {
                        activityPopup.classList.remove('show-popup');
                    }, 400); 
                }
            });
        });

    </script>
</body>
</html>
